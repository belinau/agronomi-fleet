# ble_forwarder.toml
# Configuration for the BLE→RNS forwarder running on Mimi
#
# Telemetry is sent via a SINGLE destination ("farm", "telemetry_readings")
# with announce-based path discovery. The forwarder listens for the ingest
# daemon's announce and discovers its identity automatically — no manual
# destination hash configuration needed.

[gateway]
# Identity of this field gateway, included in every forwarded packet
gateway_id = "GW-MIMI-01"

# Serial port where Pico 2W is connected
serial_port = "/dev/pico"
serial_baud = 115200

# Path to store/load the gateway's persistent RNS identity.
# This identity is used for the command destination so the hub
# can reach this gateway. DO NOT delete this file between restarts
# or the destination hash will change and the hub won't find you.
identity_path = "./gateway.identity"

# RNS aspect name for receiving commands from the hub.
# The full destination is farm.<command_aspect> (e.g. farm.gateway_commands)
command_aspect = "gateway_commands"

# BLE MAC address mapping for OTA target devices.
# The C6 nodes advertise as SN-SOIL-01, SN-AIR-01 etc. via NimBLE.
# These MACs are used by the gateway's bleak BLE client to connect for OTA.
# Update these with the actual MAC addresses from your C6 nodes.
[gateway.ble_mac_map]
SN-SOIL-01 = "AA:BB:CC:DD:EE:01"
SN-AIR-01 = "AA:BB:CC:DD:EE:02"
