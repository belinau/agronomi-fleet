; ==============================================================================
; 1. SOIL MOISTURE NODE (ESP32-C6)
; ==============================================================================
[env:sn_soil]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board     = seeed_xiao_esp32c6_arduino
framework = arduino

board_build.partitions = partitions_4mb_large_app.csv

monitor_speed = 115200
upload_speed  = 460800

build_flags =
    -D CONFIG_BT_NIMBLE_ENABLED=1
    -D CONFIG_NIMBLE_STACK_USE_MEM_POOLS=0
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D ARDUINO_USB_MODE=0
    -D DEVICE_ID=\"SN-SOIL-01\"
    -D GATEWAY_NAME=\"GW-MIMI-01\"
    -D WIFI_SSID=\"YOUR_GREENHOUSE_WIFI\"
    -D WIFI_PASS=\"YOUR_GREENHOUSE_PASS\"
    -D FIRMWARE_VERSION=\"1.3.0\"
    -D HAS_DHT22=0
    -D HAS_SOIL_SENSOR=1
    -D HAS_TEMP_SENSOR=1
    -D HAS_BAT_RESISTORS=1
    -D ENABLE_DEEPSLEEP=0
    -D SLEEP_INTERVAL_SEC=300

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    h2zero/NimBLE-Arduino @ ^2.3.9
    pstolarz/OneWireNg @ ^0.14.1
    milesburton/DallasTemperature @ ^4.0.0

; DallasTemperature pulls in paulstoffregen/OneWire as a dependency,
; but that lib does NOT support ESP32-C6 (different GPIO register structs).
; OneWireNg provides a OneWire-compatible API and supports ESP32-C6 natively.
lib_ignore = OneWire

; Compiles only the files in the src/sn_soil folder
build_src_filter = +<sn_soil>

