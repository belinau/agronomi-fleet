; ==============================================================================
; 5. VISION NODE (ESP32-CAM AI Thinker)
; ==============================================================================
[env:sn_vision]
platform = espressif32
board = esp32cam
framework = arduino

; Use PlatformIO's built-in large partition scheme for classic ESP32s
board_build.partitions = min_spiffs.csv

monitor_speed = 115200
upload_speed = 460800

build_flags =
    -D DEVICE_ID='"SN-VIS-GH-01"'
    -D WIFI_SSID='"FRITZ!Box 5490 ME"'
    -D WIFI_PASS='"99141440711753817435"'
    -D FARM_POD_HOST='"100.77.106.18"'
    -D FARM_POD_PORT=8765
    -D CAPTURE_INTERVAL_SEC=1800
    -D ENABLE_DEEPSLEEP=0
    -D HAS_TEMP_SENSOR=0
    -D HAS_BAT_RESISTORS=0
    -D FIRMWARE_VERSION="1.3.0"
    ; The camera library needs this extra flag to compile cleanly
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; Compiles only the files in the src/sn_vision folder
build_src_filter = +<sn_vision>
